# Engine CI — runs THIS engine's OWN test suite.
#
# Why this exists: `consumer-ci.yml` runs the two CONSUMER app suites against
# this engine commit. Both are valuable, and neither runs the engine's own
# 24-file suite — so before this lane existed, `test/views/component_css_test.rb`,
# `test/integration/component_css_bundle_test.rb`, and
# `test/views/modal_host_store_behavior_test.rb` had NO CI coverage at all. The
# store behavior suite is the only test that executes the modal host's Alpine
# store for real (the source-string suites stay green under a cardClasses
# clobber), so it was the least-covered test with the most teeth.
#
# The suite runs through `bin/release-check`, the same entry point used for a
# local cert and a gem release, so CI and the release gate cannot drift apart.
#
# node is REQUIRED, not optional: the store behavior suite runs the extracted
# store <script> under node with browser stubs, and it now FAILS rather than
# skips when node is absent. `bin/release-check`'s suite guard additionally
# rejects any file that runs zero tests or skips one, so a lane that silently
# stops covering something goes red instead of green.

name: Engine CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  engine-suite:
    name: engine suite (bin/release-check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      # Gemfile.lock MUST keep the `x86_64-linux` platform or this step fails
      # with "your bundle only supports platforms [arm64-darwin-*]" — the lock
      # is generated on Apple Silicon, and this is the first lane to run the
      # engine's own bundle on Linux (the consumer lanes bundle in the CONSUMER
      # repo, where the engine is a path gem, so they never needed it).
      # If you regenerate the lock, re-run: bundle lock --add-platform x86_64-linux
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11
          bundler-cache: true

      # Node 20 matches the ecosystem's mise-managed local runtime (v20.20.2),
      # which is what the store behavior harness was written and verified
      # against. Keep this MAJOR in step with `mise install node@20` so a
      # passing local run and a passing CI run mean the same thing.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run the engine suite
        run: bin/release-check
